# New-API Docker Compose Configuration
# 
# Quick Start:
#   1. docker-compose up -d
#   2. Access at http://localhost:3000
#
# Using MySQL instead of PostgreSQL:
#   1. Comment out the postgres service and SQL_DSN line 15
#   2. Uncomment the mysql service and SQL_DSN line 16
#   3. Uncomment mysql in depends_on (line 28)
#   4. Uncomment mysql_data in volumes section (line 64)
#
# 鈿狅笍  IMPORTANT: Change all default passwords before deploying to production!

version: '3.4' # For compatibility with older Docker versions

services:
  new-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: new-api-custom:latest
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - SQL_DSN=postgresql://root:123456@postgres:5432/new-api # 鈿狅笍 IMPORTANT: Change the password in production!
#      - SQL_DSN=root:123456@tcp(mysql:3306)/new-api  # Point to the mysql service, uncomment if using MySQL
      - REDIS_CONN_STRING=redis://:123456@redis:6379 # 鈿狅笍 IMPORTANT: Change the password in production!
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true # 鏄惁鍚敤閿欒鏃ュ織璁板綍 (Whether to enable error log recording)
      - BATCH_UPDATE_ENABLED=true  # 鏄惁鍚敤鎵归噺鏇存柊 (Whether to enable batch update)
      - GLOBAL_API_RATE_LIMIT=1200
      - GLOBAL_API_RATE_LIMIT_DURATION=60
      - GLOBAL_WEB_RATE_LIMIT=600
      - GLOBAL_WEB_RATE_LIMIT_DURATION=60
      - NODE_NAME=new-api-node-1  # 鑺傜偣鍚嶇О锛岀敤浜庡璁℃棩蹇椾腑鏍囪瘑鑺傜偣韬唤锛涘鑺傜偣/瀹瑰櫒閮ㄧ讲鏃跺缓璁缃?(Node name used in audit logs; recommended when running multiple instances or in containers)
#      - STREAMING_TIMEOUT=300  # 娴佹ā寮忔棤鍝嶅簲瓒呮椂鏃堕棿锛屽崟浣嶇锛岄粯璁?20绉掞紝濡傛灉鍑虹幇绌鸿ˉ鍏ㄥ彲浠ュ皾璇曟敼涓烘洿澶у€?锛圫treaming timeout in seconds, default is 120s. Increase if experiencing empty completions锛?#      - SESSION_SECRET=random_string  # 澶氭満閮ㄧ讲鏃惰缃紝蹇呴』淇敼杩欎釜闅忔満瀛楃涓诧紒锛?锛坢ulti-node deployment, set this to a random string!!!!!!!锛?#      - SYNC_FREQUENCY=60  # Uncomment if regular database syncing is needed
#      - GOOGLE_ANALYTICS_ID=G-XXXXXXXXXX  # Google Analytics 鐨勬祴閲?ID (Google Analytics Measurement ID)
#      - UMAMI_WEBSITE_ID=xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx  # Umami 缃戠珯 ID (Umami Website ID)
#      - UMAMI_SCRIPT_URL=https://analytics.umami.is/script.js  # Umami 鑴氭湰 URL锛岄粯璁や负瀹樻柟鍦板潃 (Umami Script URL, defaults to official URL)

    depends_on:
      - redis
      - postgres
#      - mysql  # Uncomment if using MySQL
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:latest
    container_name: redis
    restart: always
    command: ["redis-server", "--requirepass", "123456"]  # 鈿狅笍 IMPORTANT: Change this password in production!
    networks:
      - new-api-network

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456  # 鈿狅笍 IMPORTANT: Change this password in production!
      POSTGRES_DB: new-api
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - new-api-network
#    ports:
#      - "5432:5432"  # Uncomment if you need to access PostgreSQL from outside Docker

#  mysql:
#    image: mysql:8.2
#    container_name: mysql
#    restart: always
#    environment:
#      MYSQL_ROOT_PASSWORD: 123456  # 鈿狅笍 IMPORTANT: Change this password in production!
#      MYSQL_DATABASE: new-api
#    volumes:
#      - mysql_data:/var/lib/mysql
#    networks:
#      - new-api-network
#    ports:
#      - "3306:3306"  # Uncomment if you need to access MySQL from outside Docker

volumes:
  pg_data:
#  mysql_data:

networks:
  new-api-network:
    driver: bridge
